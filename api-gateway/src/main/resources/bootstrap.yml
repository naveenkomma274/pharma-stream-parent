spring:
  application:
    name: api-gateway  # This fixes the "UNKNOWN" and "UNDEFINED" issues

  cloud:
    gateway:
      routes:
        - id: prescription-service
          uri: lb://prescription-service
          predicates:
            - Path=/api/prescriptions/**

        - id: inventory-service
          uri: lb://inventory-service
          predicates:
            - Path=/api/inventory/**

server:
  port: 9090

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

springdoc:
  swagger-ui:
    # This creates the dropdown menu in the Gateway UI (Port 9090)
    urls:
      - name: Prescription Service
        url: /api/prescriptions/v3/api-docs
      - name: Inventory Service
        url: /api/inventory/v3/api-docs

logging:
  level:
    # Keeps your detailed trace logs for Day 8 troubleshooting
    org.springframework.cloud.gateway: TRACE
    org.springframework.http.server.reactive: DEBUG
    org.springframework.web.reactive: DEBUG
    org.springframework.cloud.loadbalancer: DEBUG