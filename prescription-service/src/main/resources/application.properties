server.port=8081
spring.application.name=prescription-service

# MongoDB connection string
spring.data.mongodb.uri=mongodb://localhost:27017/pharma_db

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Sampling probability 1.0 means send 100% of traces (Good for Dev/Testing)
management.tracing.sampling.probability=1.0

# The endpoint where Zipkin is listening
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# PRO TIP: This updates your logs to show [service-name, traceId, spanId]
logging.pattern.level=%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]

# Custom path for Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
# Enables the documentation in JSON format too
#springdoc.api-docs.path=/v3/api-docs
# This tells SpringDoc to host its metadata at a path the Gateway expects
springdoc.api-docs.path=/api/prescriptions/v3/api-docs
# This ensures that the Request Context is available to Feign Interceptors
spring.main.allow-bean-definition-overriding=true