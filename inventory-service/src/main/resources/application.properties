server.port=8082
spring.application.name=inventory-service

# H2 Database Config
spring.datasource.url=jdbc:h2:mem:inventorydb
spring.h2.console.enabled=true

# Eureka Config
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Sampling probability 1.0 means send 100% of traces (Good for Dev/Testing)
management.tracing.sampling.probability=1.0

# The endpoint where Zipkin is listening
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# PRO TIP: This updates your logs to show [service-name, traceId, spanId]
logging.pattern.level=%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]

# Custom path for Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
# Enables the documentation in JSON format too
#springdoc.api-docs.path=/v3/api-docs
# Ensure this matches the routing prefix used in the Gateway
springdoc.api-docs.path=/api/inventory/v3/api-docs